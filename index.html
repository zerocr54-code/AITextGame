<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI RPG - Visual Web Terminal</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #111;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.1);
            padding: 20px;
            border-radius: 5px;
        }

        h1 {
            text-align: center;
            color: #00ff66;
            font-size: 20px;
            text-transform: uppercase;
        }

        .game-layout {
            display: none;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-top: 15px;
        }

        .setup-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea {
            background: #000;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 10px;
            font-family: inherit;
            border-radius: 3px;
        }

        button {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            border-radius: 3px;
        }

            button:hover {
                background: #00cc52;
            }

        #terminal {
            height: 450px;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .image-panel {
            background: #000;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 3px;
            position: relative;
            min-height: 400px;
        }

        #gameImage {
            width: 100%;
            height: auto;
            max-height: 380px;
            object-fit: cover;
            border: 1px solid #222;
            display: none;
        }

        .image-placeholder {
            color: #00ff66;
            text-align: center;
            font-size: 13px;
        }

        .log {
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .player-log {
            color: #ffff00;
        }

        .system-log {
            color: #00bfff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🤖 AI Dungeon Master Terminal v1.5</h1>
        <hr style="border-color: #333; margin-bottom: 20px;">

        <div id="setupScreen" class="setup-box">
            <label>1. Oyun Evreni / Dünya:</label>
            <input type="text" id="dunya" placeholder="Örn: Orta Çağ, Siberpunk, Kıyamet Sonrası">

            <label>2. Karakterinizin Rolü:</label>
            <input type="text" id="rol" placeholder="Örn: Bir büyücü çırağı, sokak serserisi, dedektif">

            <label>3. Oyunun Teması:</label>
            <input type="text" id="tema" placeholder="Örn: Romantizm, Aksiyon/Macera, Gizem">

            <label>4. Ekstra Detaylar (İsteğe Bağlı):</label>
            <textarea id="detay" rows="3" placeholder="Örn: Çok utangaç biriyim..."></textarea>

            <button onclick="oyunuBaslat()">Dünyayı İnşa Et ve Başlat</button>
        </div>

        <div id="gameScreen" class="game-layout">
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div id="terminal"></div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="playerAction" placeholder="Ne yapıyorsunuz? (Örn: Çevreye göz atıyorum...)" style="flex: 1;" onkeypress="if(event.key === 'Enter') hamleYap()">
                    <button onclick="hamleYap()">Gönder</button>
                </div>
            </div>

            <div class="image-panel">
                <div id="imageStatus" class="image-placeholder">Görsel bekleniyor...</div>
                <img id="gameImage" alt="Oyun Sahnesi">
            </div>
        </div>
    </div>

    <script>
       async function oyunuBaslat() {
            const setupData = {
                dunya: document.getElementById('dunya').value,
                rol: document.getElementById('rol').value,
                tema: document.getElementById('tema').value,
                detay: document.getElementById('detay').value
            };

            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'grid';

            const terminal = document.getElementById('terminal');
            terminal.innerHTML += `<div class="log system-log">[Sistem]: Dünya çiziliyor, lütfen bekleyin...</div>`;

            const baslangicMetni = `Şu ayarlarla bir RYO (RPG) oyunu başlat: Dünya: ${setupData.dunya}, Rol: ${setupData.rol}, Tema: ${setupData.tema}, Detay: ${setupData.detay}. Bana bulunduğum ortamı betimle ve maceraya başlamak için ne yapmak istediğimi sor.`;

            try {
                const apiKey = "AQ.Ab8RN6LvQwlLqco2BmMgAH_QdzpZYaDkZ93YRhvglCKYcj7Pyw"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: baslangicMetni }] }]
                    })
                });
                
                const data = await response.json();
                const aiCevabi = data.candidates[0].content.parts[0].text;

                terminal.innerHTML = `<div class="log"><b>Oyun Yöneticisi:</b>\n${aiCevabi}</div>`;
                gorselGuncelle(aiCevabi, aiCevabi);

            } catch (error) {
                terminal.innerHTML += `<div class="log" style="color:red">[Hata]: Gemini API'ye bağlanılamadı.</div>`;
                console.error(error);
            }
        }

        async function hamleYap() {
            const actionInput = document.getElementById('playerAction');
            const action = actionInput.value.trim();
            if (!action) return;

            actionInput.value = '';
            const terminal = document.getElementById('terminal');

            terminal.innerHTML += `<div class="log player-log"><b>Sen:</b> ${action}</div>`;
            terminal.scrollTop = terminal.scrollHeight;

            const thinkingId = 'thinking-' + Date.now();
            terminal.innerHTML += `<div class="log system-log" id="${thinkingId}">[Oyun Yöneticisi Düşünüyor...]</div>`;
            terminal.scrollTop = terminal.scrollHeight;

            document.getElementById('gameImage').style.display = 'none';
            document.getElementById('imageStatus').style.display = 'block';
            document.getElementById('imageStatus').innerText = 'Yeni sahne çiziliyor...';

            try {
                const apiKey = "AQ.Ab8RN6LvQwlLqco2BmMgAH_QdzpZYaDkZ93YRhvglCKYcj7Pyw"; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: action }] }]
                    })
                });

                const data = await response.json();
                const aiCevabi = data.candidates[0].content.parts[0].text;

                document.getElementById(thinkingId).remove();
                terminal.innerHTML += `<div class="log"><b>Oyun Yöneticisi:</b>\n${aiCevabi}</div>`;
                terminal.scrollTop = terminal.scrollHeight;
                gorselGuncelle(aiCevabi, aiCevabi); 

            } catch (error) {
                if (document.getElementById(thinkingId)) {
                    document.getElementById(thinkingId).innerHTML = `<div style="color:red">[Hata]: Bir sorun oluştu.</div>`;
                }
                console.error("Gemini API Hatası:", error);
            }
        }

        function gorselGuncelle(prompt, sonHikayeMetni) {
            const imgElement = document.getElementById('gameImage');
            const statusElement = document.getElementById('imageStatus');

            let temizMetin = sonHikayeMetni
                .replace(/[\n\r]/g, ' ')
                .replace(/[^\w\s.,!?-]/g, '')
                .trim();

            let finalPrompt = "fantasy game scene, digital art, " + temizMetin.substring(0, 150);
            const safePrompt = encodeURIComponent(finalPrompt);

            const yeniResimUrl = `https://image.pollinations.ai/prompt/${safePrompt}?nologo=true`;

            statusElement.style.display = 'block';
            statusElement.innerText = 'Görsel oluşturuluyor...';
            imgElement.style.display = 'none';

            imgElement.onload = function() {
                statusElement.style.display = 'none';
                imgElement.style.display = 'block';
            };

            imgElement.onerror = function() {
                statusElement.style.display = 'block';
                statusElement.innerText = 'Görsel yüklenemedi.';
            };

            imgElement.src = yeniResimUrl;
        }
    </script>
</body>
</html>
