<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI RPG - Visual Web Terminal</title>
  <style>
    * { box-sizing: border-box; }
    body { background:#0a0a0a; color:#00ff66; font-family:"Courier New",monospace; margin:0; padding:20px; display:flex; justify-content:center; }
    .container { width:100%; max-width:1100px; background:#111; border:1px solid #333; box-shadow:0 0 20px rgba(0,255,102,.1); padding:20px; border-radius:5px; }
    h1 { text-align:center; font-size:20px; text-transform:uppercase; }
    .setup-box { display:flex; flex-direction:column; gap:10px; }
    .game-layout { display:none; grid-template-columns:minmax(0,1fr) 400px; gap:20px; margin-top:15px; }
    label { font-weight:bold; font-size:14px; }
    input,textarea { width:100%; background:#000; border:1px solid #00ff66; color:#00ff66; padding:10px; font:inherit; border-radius:3px; }
    button { background:#00ff66; color:#000; border:0; padding:12px; font-weight:bold; cursor:pointer; font:inherit; text-transform:uppercase; border-radius:3px; }
    button:hover { background:#00cc52; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .note { color:#aaa; font-size:12px; line-height:1.4; }
    #terminal { height:450px; background:#000; border:1px solid #333; padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
    .image-panel { min-height:400px; background:#000; border:1px solid #333; display:flex; align-items:center; justify-content:center; padding:10px; border-radius:3px; }
    #gameImage { width:100%; max-height:380px; object-fit:contain; display:none; }
    .image-placeholder { text-align:center; font-size:13px; }
    .log { line-height:1.5; white-space:pre-wrap; overflow-wrap:anywhere; }
    .player-log { color:#ffff00; }
    .system-log { color:#00bfff; }
    .error-log { color:#ff4747; }
    .action-row { display:flex; gap:10px; }
    @media (max-width:850px) { .game-layout { grid-template-columns:1fr; } .image-panel { min-height:260px; } }
  </style>
</head>
<body>
  <main class="container">
    <h1>🤖 AI Dungeon Master Terminal v3.0</h1>
    <hr style="border-color:#333;margin-bottom:20px">

    <section id="setupScreen" class="setup-box">
      <label for="apiKey">Gemini API anahtarı:</label>
      <input type="password" id="apiKey" autocomplete="off" placeholder="AIza...">
      <div class="note">Anahtar GitHub dosyasına kaydedilmez; yalnızca bu açık sekmede kullanılır.</div>

      <label for="dunya">1. Oyun Evreni / Dünya:</label>
      <input id="dunya" placeholder="Örn: Orta Çağ, Siberpunk, Kıyamet Sonrası">
      <label for="rol">2. Karakterinizin Rolü:</label>
      <input id="rol" placeholder="Örn: Büyücü çırağı, dedektif, kâşif">
      <label for="tema">3. Oyunun Teması:</label>
      <input id="tema" placeholder="Örn: Aksiyon/Macera, Gizem">
      <label for="detay">4. Ekstra Detaylar (isteğe bağlı):</label>
      <textarea id="detay" rows="3" placeholder="Karakter veya dünya hakkındaki ek bilgiler..."></textarea>
      <button id="startButton" type="button">Dünyayı İnşa Et ve Başlat</button>
    </section>

    <section id="gameScreen" class="game-layout">
      <div style="display:flex;flex-direction:column;gap:15px">
        <div id="terminal" aria-live="polite"></div>
        <div class="action-row">
          <input id="playerAction" placeholder="Ne yapıyorsunuz?" style="flex:1">
          <button id="sendButton" type="button">Gönder</button>
        </div>
      </div>
      <div class="image-panel">
        <div id="imageStatus" class="image-placeholder">Görsel bekleniyor...</div>
        <img id="gameImage" alt="Oyun sahnesi">
      </div>
    </section>
  </main>

  <script>
    "use strict";

    const MODEL = "gemini-2.5-flash";
    let apiKey = "";
    let conversation = [];
    let gameRules = "";

    const $ = id => document.getElementById(id);

    function addLog(text, className = "") {
      const div = document.createElement("div");
      div.className = `log ${className}`.trim();
      div.textContent = text;
      $("terminal").appendChild(div);
      $("terminal").scrollTop = $("terminal").scrollHeight;
      return div;
    }

    function readableError(data, status) {
      const message = data?.error?.message || `HTTP ${status}`;
      if (status === 400) return `Geçersiz istek: ${message}`;
      if (status === 403) return `API anahtarı reddedildi veya yetkisi yok: ${message}`;
      if (status === 404) return `Gemini modeli bulunamadı: ${message}`;
      if (status === 429) return `Kullanım sınırına ulaşıldı. Biraz sonra tekrar dene: ${message}`;
      return `Gemini API hatası: ${message}`;
    }

    async function askGemini(userText) {
      conversation.push({ role:"user", parts:[{ text:userText }] });
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

      let response;
      try {
        response = await fetch(url, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify({
            systemInstruction:{ parts:[{ text:gameRules }] },
            contents:conversation,
            generationConfig:{ temperature:0.9, maxOutputTokens:1200 }
          })
        });
      } catch (_) {
        conversation.pop();
        throw new Error("İnternet bağlantısı kurulamadı veya istek tarayıcı tarafından engellendi.");
      }

      let data;
      try { data = await response.json(); }
      catch (_) { data = {}; }

      if (!response.ok) {
        conversation.pop();
        throw new Error(readableError(data, response.status));
      }

      const answer = data?.candidates?.[0]?.content?.parts
        ?.map(part => part.text || "").join("\n").trim();

      if (!answer) {
        conversation.pop();
        const reason = data?.candidates?.[0]?.finishReason || "bilinmeyen neden";
        throw new Error(`Gemini metin döndürmedi. Bitiş nedeni: ${reason}`);
      }

      conversation.push({ role:"model", parts:[{ text:answer }] });
      if (conversation.length > 20) conversation = conversation.slice(-20);
      return answer;
    }

    async function startGame() {
      apiKey = $("apiKey").value.trim();
      const world = $("dunya").value.trim();
      const role = $("rol").value.trim();
      const theme = $("tema").value.trim();
      const details = $("detay").value.trim();

      if (!apiKey || !world || !role || !theme) {
        alert("API anahtarı, dünya, rol ve tema alanlarını doldur.");
        return;
      }

      gameRules = `Sen Türkçe konuşan bir RPG oyun yöneticisisin. Dünya: ${world}. Oyuncunun rolü: ${role}. Tema: ${theme}. Ek bilgiler: ${details || "Yok"}. Olayları tutarlı sürdür, oyuncunun yerine karar verme, her cevapta sahneyi kısa ve canlı biçimde anlatıp oyuncuya ne yapacağını sor. Güvenli ve yaşa uygun içerik üret.`;
      conversation = [];
      $("setupScreen").style.display = "none";
      $("gameScreen").style.display = "grid";
      $("sendButton").disabled = true;
      addLog("[Sistem]: Dünya hazırlanıyor, lütfen bekleyin...", "system-log");

      try {
        const answer = await askGemini("Oyunu başlat. Bulunduğum ilk sahneyi betimle ve ne yapmak istediğimi sor.");
        $("terminal").textContent = "";
        addLog(`Oyun Yöneticisi:\n${answer}`);
        updateImage(answer);
      } catch (error) {
        addLog(`[Hata]: ${error.message}`, "error-log");
        $("setupScreen").style.display = "flex";
        $("gameScreen").style.display = "none";
      } finally {
        $("sendButton").disabled = false;
      }
    }

    async function makeMove() {
      const input = $("playerAction");
      const action = input.value.trim();
      if (!action || $("sendButton").disabled) return;

      input.value = "";
      addLog(`Sen: ${action}`, "player-log");
      const thinking = addLog("[Oyun Yöneticisi düşünüyor...]", "system-log");
      $("sendButton").disabled = true;

      try {
        const answer = await askGemini(action);
        thinking.remove();
        addLog(`Oyun Yöneticisi:\n${answer}`);
        updateImage(answer);
      } catch (error) {
        thinking.textContent = `[Hata]: ${error.message}`;
        thinking.className = "log error-log";
      } finally {
        $("sendButton").disabled = false;
        input.focus();
      }
    }

    function updateImage(story) {
      const image = $("gameImage");
      const status = $("imageStatus");
      const clean = story.replace(/[\n\r]+/g," ").replace(/[^\p{L}\p{N}\s.,!?-]/gu,"").trim();
      const prompt = encodeURIComponent(`fantasy game scene, digital art, cinematic, ${clean.slice(0,220)}`);

      status.style.display = "block";
      status.textContent = "Görsel oluşturuluyor...";
      image.style.display = "none";
      image.onload = () => { status.style.display="none"; image.style.display="block"; };
      image.onerror = () => { status.style.display="block"; status.textContent="Görsel yüklenemedi."; };
      image.src = `https://image.pollinations.ai/prompt/${prompt}?nologo=true&width=768&height=768&seed=${Date.now()}`;
    }

    $("startButton").addEventListener("click", startGame);
    $("sendButton").addEventListener("click", makeMove);
    $("playerAction").addEventListener("keydown", event => {
      if (event.key === "Enter") makeMove();
    });
  </script>
</body>
</html>
