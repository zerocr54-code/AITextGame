<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI RPG - Visual Web Terminal</title>
  <style>
    *{box-sizing:border-box}body{margin:0;padding:20px;background:#080a09;color:#00ff66;font-family:"Courier New",monospace;display:flex;justify-content:center}.container{width:100%;max-width:1100px;padding:20px;background:#111;border:1px solid #29332d;border-radius:6px;box-shadow:0 0 22px #00ff6615}h1{text-align:center;font-size:20px}.setup{display:flex;flex-direction:column;gap:10px}label{font-weight:bold}input,textarea{width:100%;padding:11px;background:#000;color:#00ff66;border:1px solid #00ff66;border-radius:3px;font:inherit}button{padding:12px;background:#00ff66;color:#000;border:0;border-radius:3px;font:inherit;font-weight:bold;cursor:pointer}button:disabled{opacity:.55;cursor:not-allowed}.game{display:none;grid-template-columns:minmax(0,1fr) 400px;gap:20px}.left{display:flex;flex-direction:column;gap:14px}.terminal{height:450px;padding:15px;background:#000;border:1px solid #333;overflow-y:auto;white-space:pre-wrap}.log{margin-bottom:14px;line-height:1.5}.player{color:#ffe600}.system{color:#00bfff}.error{color:#ff5555}.actions{display:flex;gap:10px}.actions input{flex:1}.image-panel{min-height:420px;padding:10px;background:#000;border:1px solid #333;display:flex;align-items:center;justify-content:center;position:relative;text-align:center}.image-wrap{display:none;width:100%;position:relative}.image-wrap img{display:block;width:100%;max-height:390px;object-fit:contain}.image-wrap.is-blurred img{filter:blur(22px)}.reveal{display:none;position:absolute;inset:0;margin:auto;width:max-content;height:max-content}.image-wrap.is-blurred .reveal{display:block}.status{font-size:13px}.turn{color:#aaa;font-size:12px;text-align:right}@media(max-width:850px){.game{grid-template-columns:1fr}.image-panel{min-height:280px}.actions{flex-wrap:wrap}}
  </style>
</head>
<body>
  <main class="container">
    <h1>🤖 AI Dungeon Master Terminal v4.0</h1><hr style="border-color:#333;margin-bottom:20px">
    <section id="setup" class="setup">
      <label>Dünya</label><input id="dunya" placeholder="Örn: Orta Çağ, Siberpunk, Kıyamet Sonrası">
      <label>Karakterinizin rolü</label><input id="rol" placeholder="Örn: Kâşif, dedektif, büyücü çırağı">
      <label>Oyunun teması</label><input id="tema" placeholder="Örn: Aksiyon/Macera, Gizem">
      <label>Ekstra detaylar</label><textarea id="detay" rows="3" placeholder="Karakter veya dünya hakkındaki ek bilgiler..."></textarea>
      <button id="start">Dünyayı inşa et ve başlat</button>
    </section>
    <section id="game" class="game">
      <div class="left">
        <div id="terminal" class="terminal" aria-live="polite"></div>
        <div id="turn" class="turn"></div>
        <div class="actions"><input id="action" placeholder="Ne yapıyorsunuz?"><button id="send">Gönder</button></div>
      </div>
      <div class="image-panel">
        <div id="status" class="status">Görsel bekleniyor...</div>
        <div id="imageWrap" class="image-wrap"><img id="image" alt="Oyun sahnesi"><button id="reveal" class="reveal">Görseli göster</button></div>
      </div>
    </section>
  </main>
  <script>
    "use strict";
    const API_BASE_URL = ""; // Backend başka adresteyse örn: https://sunucum.example.com
    const $ = id => document.getElementById(id);
    let gameId = "";
    let imageObjectUrl = "";

    function log(text, type=""){
      const div=document.createElement("div");div.className=`log ${type}`;div.textContent=text;
      $("terminal").appendChild(div);$("terminal").scrollTop=$("terminal").scrollHeight;return div;
    }
    async function jsonRequest(path,options){
      const response=await fetch(API_BASE_URL+path,options);let data={};
      try{data=await response.json();}catch{}
      if(!response.ok)throw new Error(data.error||`Sunucu hatası: ${response.status}`);return data;
    }
    async function startGame(){
      const body={dunya:$("dunya").value.trim(),rol:$("rol").value.trim(),tema:$("tema").value.trim(),detay:$("detay").value.trim()};
      if(!body.dunya||!body.rol||!body.tema){alert("Dünya, rol ve tema alanlarını doldur.");return}
      $("start").disabled=true;$("setup").style.display="none";$("game").style.display="grid";log("[Sistem] Dünya hazırlanıyor...","system");
      try{
        const data=await jsonRequest("/api/game/start",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        gameId=data.gameId;$("terminal").textContent="";log("Oyun Yöneticisi:\n"+data.response);updateTurn(data);loadImage(data.imagePrompt,data.blurImage);
      }catch(error){log("[Hata] "+error.message,"error");$("setup").style.display="flex";$("game").style.display="none"}
      finally{$("start").disabled=false}
    }
    async function makeMove(){
      const action=$("action").value.trim();if(!action||$("send").disabled)return;$("action").value="";log("Sen: "+action,"player");
      const thinking=log("[Oyun Yöneticisi düşünüyor...]","system");$("send").disabled=true;
      try{
        const data=await jsonRequest("/api/game/action",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({gameId,action})});
        thinking.remove();log("Oyun Yöneticisi:\n"+data.response);updateTurn(data);loadImage(data.imagePrompt,data.blurImage);
      }catch(error){thinking.textContent="[Hata] "+error.message;thinking.className="log error"}
      finally{$("send").disabled=false;$("action").focus()}
    }
    function updateTurn(data){$("turn").textContent=`Tur ${data.turn}/${data.maxTurns}`}
    async function loadImage(prompt,blur){
      $("status").style.display="block";$("status").textContent="Görsel oluşturuluyor...";$("imageWrap").style.display="none";
      try{
        const response=await fetch(API_BASE_URL+"/api/game/image?prompt="+encodeURIComponent(prompt));
        if(!response.ok){let data={};try{data=await response.json()}catch{}throw new Error(data.error||`HTTP ${response.status}`)}
        const blob=await response.blob();if(!blob.type.startsWith("image/"))throw new Error("Geçerli görsel alınamadı.");
        if(imageObjectUrl)URL.revokeObjectURL(imageObjectUrl);imageObjectUrl=URL.createObjectURL(blob);$("image").src=imageObjectUrl;
        $("imageWrap").classList.toggle("is-blurred",Boolean(blur));$("status").style.display="none";$("imageWrap").style.display="block";
      }catch(error){$("status").textContent="Görsel üretilemedi: "+error.message}
    }
    $("start").addEventListener("click",startGame);$("send").addEventListener("click",makeMove);
    $("action").addEventListener("keydown",event=>{if(event.key==="Enter")makeMove()});
    $("reveal").addEventListener("click",()=>$("imageWrap").classList.remove("is-blurred"));
  </script>
</body>
</html>
